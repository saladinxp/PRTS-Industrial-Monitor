<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PRTS — Command Nexus</title>
<script>if(location.pathname.endsWith('.html'))history.replaceState(null,'',location.pathname.replace('.html',''))</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p-bg:#f2f1ed;--p-bg-warm:#e9e8e3;--p-surface:#eceae5;--p-surface-hover:#f5f4f0;
  --p-border:rgba(0,0,0,0.08);--p-border-strong:rgba(0,0,0,0.18);
  --p-text:#0a0a0a;--p-text-secondary:#555;--p-text-dim:#999;
  --p-accent:#3a9bc8;--p-accent-rgb:58,155,200;--p-accent-subtle:rgba(58,155,200,0.07);
  --p-brand:#FFD100;--p-brand-rgb:255,209,0;--p-brand-on:#0a0a0a;
  --p-warn:#d4940a;--p-warn-rgb:212,148,10;
  --p-danger:#c22525;--p-danger-rgb:194,37,37;
  --p-success:#1a8a42;--p-success-rgb:26,138,66;
  --p-corner:rgba(0,0,0,0.12);--p-grid:rgba(0,0,0,0.025);
  --p-mono:'Share Tech Mono',monospace;--p-sans:'Inter','Noto Sans SC',system-ui,sans-serif;
  --p-display:'Inter',sans-serif;--p-radius:1px;
}
[data-theme="dark"]{
  --p-bg:#111114;--p-bg-warm:#19191d;--p-surface:#1e1e22;--p-surface-hover:#282830;
  --p-border:rgba(255,255,255,0.09);--p-border-strong:rgba(255,255,255,0.18);
  --p-text:#e4e4e0;--p-text-secondary:#aaa;--p-text-dim:#666;
  --p-accent:#4db8e8;--p-accent-rgb:77,184,232;--p-accent-subtle:rgba(77,184,232,0.08);
  --p-brand:#FFD100;--p-brand-rgb:255,209,0;--p-brand-on:#0a0a0a;
  --p-corner:rgba(255,255,255,0.16);--p-grid:rgba(255,255,255,0.035);
}
html,body{height:100%;background:var(--p-bg);color:var(--p-text);font-family:var(--p-sans);overflow-y:auto;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.ck{position:relative;z-index:1;padding:12px;max-width:1800px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.body-row{display:flex;gap:8px;align-items:stretch}
.col-left{flex:0 0 clamp(240px,20%,300px);display:flex;flex-direction:column;gap:8px}
.col-center{flex:1;display:flex;flex-direction:column;gap:8px}
.col-right{flex:0 0 clamp(220px,18%,280px);display:flex;flex-direction:column;gap:8px}
.p{background:var(--p-surface);border:1px solid var(--p-border-strong);position:relative;overflow:hidden}
.pt{font-family:var(--p-mono);font-size:10px;letter-spacing:2.5px;color:var(--p-text-dim);padding:10px 14px 0;display:flex;align-items:center;gap:6px;text-transform:uppercase}
.pt::before{content:'◆';color:var(--p-accent);font-size:8px}
.ptag{font-family:var(--p-mono);font-size:9px;letter-spacing:1.5px;color:var(--p-text-dim);border:1px solid var(--p-border-strong);padding:1px 6px;margin-left:auto}
.hd{display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:var(--p-surface);border:1px solid var(--p-border-strong);padding:10px 16px}
.hc{padding:3px 12px;border-right:1px solid var(--p-border);display:flex;flex-direction:column;gap:1px}.hc:last-child{border-right:none}
.hk{font-family:var(--p-mono);font-size:9px;letter-spacing:2px;color:var(--p-text-dim)}
.hv{font-family:var(--p-sans);font-size:14px;font-weight:700;color:var(--p-text)}
.hv.on{color:var(--p-success)}.hv.hp{color:var(--p-accent)}.hv.lt{color:var(--p-accent);font-family:var(--p-mono);font-size:12px}
.back-btn{background:transparent;border:1px solid var(--p-border-strong);padding:4px 12px;cursor:pointer;font-family:var(--p-mono);font-size:10px;letter-spacing:1px;color:var(--p-text-secondary);transition:.2s;text-decoration:none}
.back-btn:hover{border-color:var(--p-accent);color:var(--p-accent)}
.theme-btn{background:transparent;border:1px solid var(--p-border-strong);padding:3px 8px;cursor:pointer;font-size:14px;color:var(--p-text-dim);transition:.2s}
.theme-btn:hover{border-color:var(--p-accent);color:var(--p-accent)}

.core-wrap{display:flex;align-items:center;justify-content:center;padding:16px 10px;position:relative}
.core-ring{position:relative;width:clamp(100px,8vw,140px);height:clamp(100px,8vw,140px)}
.core-ring canvas{position:absolute;inset:0}
.core-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.core-num{font-family:var(--p-mono);font-size:clamp(18px,1.8vw,28px);font-weight:700;color:var(--p-accent);letter-spacing:2px}
.core-sub{font-family:var(--p-mono);font-size:9px;letter-spacing:2px;color:var(--p-text-dim);margin-top:2px}
.core-top{font-family:var(--p-mono);font-size:9px;letter-spacing:3px;color:var(--p-text-dim);position:absolute;top:4px;left:50%;transform:translateX(-50%)}

.met4{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mc{padding:8px 10px}
.mc-k{font-family:var(--p-mono);font-size:9px;letter-spacing:2px;color:var(--p-text-dim);text-transform:uppercase;margin-bottom:2px}
.mc-v{font-family:var(--p-sans);font-size:clamp(16px,1.4vw,22px);font-weight:800;color:var(--p-text);line-height:1}
.mc-v span{font-family:var(--p-mono);font-size:10px;color:var(--p-text-dim);margin-left:2px}
.mc-s{font-family:var(--p-mono);font-size:9px;color:var(--p-text-dim);margin-top:2px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:4px 14px;border-bottom:1px solid var(--p-border)}.ir:last-child{border-bottom:none}
.ik{font-family:var(--p-mono);font-size:10px;letter-spacing:1.5px;color:var(--p-text-dim)}
.iv{font-family:var(--p-sans);font-size:11px;font-weight:600;color:var(--p-text);text-align:right}.iv.c{color:var(--p-accent)}

.charts4{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1}
.chart-panel{display:flex;flex-direction:column;padding:10px}
.ch-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:4px}
.ch-label{font-family:var(--p-mono);font-size:10px;letter-spacing:2px;color:var(--p-accent);font-weight:600}
.ch-now{font-family:var(--p-sans);font-size:clamp(14px,1.2vw,18px);font-weight:800;color:var(--p-text)}
.ch-now span{font-family:var(--p-mono);font-size:10px;color:var(--p-text-dim);margin-left:2px}
.ch-wrap{height:clamp(80px,9vh,130px);border:1px solid var(--p-border);background:linear-gradient(180deg,rgba(var(--p-accent-rgb),0.02),transparent);padding:2px;position:relative;overflow:hidden}
.ch-wrap canvas{width:100%;height:100%;display:block}
.ch-sub-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px}
.kpi{border:1px solid var(--p-border);background:var(--p-accent-subtle);padding:4px 8px;display:flex;flex-direction:column;gap:1px}
.kpi-k{font-family:var(--p-mono);font-size:9px;letter-spacing:1.5px;color:var(--p-text-dim);text-transform:uppercase}
.kpi-v{font-family:var(--p-mono);font-size:clamp(12px,1vw,16px);font-weight:700;color:var(--p-text)}

.cbot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cbot-sec{padding:10px}
.sb{display:flex;align-items:center;gap:6px;padding:3px 0}
.sb-l{font-family:var(--p-mono);font-size:10px;letter-spacing:1px;color:var(--p-text-dim);min-width:40px}
.sb-bar{flex:1;height:5px;background:var(--p-border);overflow:hidden}
.sb-fill{height:100%}
.sb-v{font-family:var(--p-mono);font-size:9px;color:var(--p-text-secondary);min-width:70px;text-align:right}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}

.pb2{display:flex;align-items:center;gap:6px;padding:3px 14px}
.pb2-loc{font-family:var(--p-mono);font-size:10px;letter-spacing:1px;color:var(--p-text-dim);min-width:50px}
.pb2-bar{flex:1;height:4px;background:var(--p-border);overflow:hidden}
.pb2-fill{height:100%}
.pb2-ms{font-family:var(--p-mono);font-size:11px;font-weight:600;min-width:50px;text-align:right}
.sig{display:flex;align-items:center;justify-content:space-between;padding:4px 14px;border-top:1px solid var(--p-border)}
.sig-k{font-family:var(--p-mono);font-size:10px;color:var(--p-text-dim)}
.sig-v{font-family:var(--p-mono);font-size:14px;font-weight:700;letter-spacing:1px}

.inst-row{display:flex;align-items:center;gap:6px;padding:4px 14px;border-bottom:1px solid var(--p-border)}.inst-row:last-child{border-bottom:none}
.inst-k{font-family:var(--p-mono);font-size:10px;letter-spacing:1px;color:var(--p-text-dim);flex:1}
.inst-bar{width:clamp(40px,3.5vw,60px);height:4px;background:var(--p-border);overflow:hidden;margin-left:4px}
.inst-fill{height:100%}
.inst-v{font-family:var(--p-mono);font-size:clamp(11px,0.9vw,14px);font-weight:700;min-width:40px;text-align:right}

.ev{padding:4px 14px;border-bottom:1px solid var(--p-border);display:flex;align-items:start;gap:6px}.ev:last-child{border-bottom:none}
.ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ev-dot.ok{background:var(--p-success);box-shadow:0 0 6px rgba(var(--p-success-rgb),0.4)}
.ev-dot.info{background:var(--p-accent)}.ev-dot.warn{background:var(--p-warn)}
.ev-body{flex:1;min-width:0}.ev-msg{font-family:var(--p-mono);font-size:10px;color:var(--p-text);line-height:1.3}.ev-time{font-family:var(--p-mono);font-size:9px;color:var(--p-text-dim);margin-top:1px}

.ext-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ext-full{width:100%}
.ext-sec{padding:12px}
.tbl{width:100%;border-collapse:collapse;margin-top:4px}
.tbl td{font-family:var(--p-mono);font-size:10px;color:var(--p-text-secondary);padding:4px 8px;border-bottom:1px solid var(--p-border)}
.tbl td:first-child{font-weight:600;color:var(--p-text-dim);white-space:nowrap;width:60px}
.tbl tr:last-child td{border-bottom:none}
.mini-map{flex:1;min-height:180px;overflow:hidden}

.time-bar{display:flex;align-items:center;gap:6px;padding:10px 0 6px;flex-wrap:wrap}
.time-label{font-family:var(--p-mono);font-size:10px;letter-spacing:2px;color:var(--p-text-dim);font-weight:600;margin-right:8px}
.time-btn{font-family:var(--p-mono);font-size:10px;letter-spacing:1px;padding:4px 12px;border:1px solid var(--p-border-strong);background:var(--p-surface);color:var(--p-text-dim);cursor:pointer;transition:all .2s;font-weight:600}
.time-btn:hover{border-color:var(--p-accent);color:var(--p-accent)}
.time-btn.a{background:var(--p-accent);color:#fff;border-color:var(--p-accent)}
[data-theme="dark"] .time-btn.a{color:#0a0a0a}

.node-sw{position:relative;cursor:pointer;padding:5px 12px;border:1px solid var(--p-border-strong);background:var(--p-surface);transition:.2s;min-width:180px;z-index:60}
.node-sw:hover{border-color:var(--p-accent)}
.node-sw-name{font-family:var(--p-sans);font-weight:700;font-size:13px;color:var(--p-text);display:flex;align-items:center;gap:8px}
.node-sw-meta{font-family:var(--p-mono);font-size:9px;letter-spacing:1px;color:var(--p-text-dim)}
.node-sw-arrow{font-size:9px;color:var(--p-text-dim);margin-left:auto;transition:transform .2s}
.node-sw.open .node-sw-arrow{transform:rotate(180deg)}
.node-sw-drop{display:none;position:absolute;top:calc(100% + 6px);left:0;min-width:280px;max-height:70vh;overflow-y:auto;z-index:999;background:var(--p-surface);border:1px solid var(--p-border-strong);box-shadow:0 12px 40px rgba(0,0,0,.15);padding:6px}
.node-sw.open .node-sw-drop{display:block}
.nsw-group{font-family:var(--p-mono);font-size:9px;letter-spacing:2px;color:var(--p-text-dim);padding:6px 10px 3px;font-weight:600}
.nsw-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:.15s}
.nsw-item:hover{background:var(--p-accent-subtle)}
.nsw-item.active{background:var(--p-accent-subtle);border:1px solid rgba(var(--p-accent-rgb),0.15)}
.nsw-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nsw-dot.on{background:var(--p-success);box-shadow:0 0 5px rgba(var(--p-success-rgb),0.4)}.nsw-dot.off{background:var(--p-danger)}
.nsw-info{flex:1;min-width:0}
.nsw-name{font-family:var(--p-sans);font-weight:600;font-size:12px;color:var(--p-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nsw-sub{font-family:var(--p-mono);font-size:9px;color:var(--p-text-dim)}

.node-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:10px 0}
.node-btn{font-family:var(--p-mono);font-size:11px;letter-spacing:1px;padding:14px 16px;border:1px solid var(--p-border-strong);background:var(--p-surface);color:var(--p-text);cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:10px}
.node-btn:hover{border-color:var(--p-accent);background:var(--p-accent-subtle)}
.node-btn .ndot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.node-btn .ndot.on{background:var(--p-success);box-shadow:0 0 6px rgba(var(--p-success-rgb),0.4)}
.node-btn .ndot.off{background:var(--p-danger)}
.node-btn .ninfo{flex:1;min-width:0}
.node-btn .nname{font-family:var(--p-sans);font-weight:700;font-size:13px;color:var(--p-text);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-btn .nmeta{font-family:var(--p-mono);font-size:9px;color:var(--p-text-dim)}
.node-btn .nstatus{font-family:var(--p-mono);font-size:9px;letter-spacing:1px;padding:2px 6px;border:1px solid;font-weight:700;flex-shrink:0}
.node-btn .nstatus.on{color:var(--p-success);border-color:rgba(var(--p-success-rgb),0.2)}
.node-btn .nstatus.off{color:var(--p-danger);border-color:rgba(var(--p-danger-rgb),0.2)}
.loading{text-align:center;padding:60px;color:var(--p-text-dim);font-family:var(--p-mono);font-size:11px;letter-spacing:2px}

.meta-split{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
.chart-wrap-mini{height:80px;border:1px solid var(--p-border);background:linear-gradient(180deg,rgba(var(--p-accent-rgb),0.02),transparent);padding:2px;position:relative;overflow:hidden}
.chart-wrap-mini canvas{width:100%;height:100%;display:block}

@media(max-width:1024px){.body-row{flex-direction:column}.col-left,.col-right{flex:none;width:100%}.charts4{grid-template-columns:1fr}.cbot{grid-template-columns:1fr}}
@media(max-width:768px){.ck{padding:6px}.hd{padding:8px 10px;gap:6px;flex-wrap:wrap}.charts4,.ext-row{grid-template-columns:1fr}.meta-split{grid-template-columns:1fr}.cbot{grid-template-columns:1fr 1fr}.met4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.charts4,.cbot{grid-template-columns:1fr}.met4{grid-template-columns:1fr 1fr}.hc{padding:2px 6px}.node-sw{min-width:120px}}
</style>
</head>
<body>
<div class="ck" id="app">
  <div class="loading" id="initLoad">ESTABLISHING CONNECTION ...</div>
</div>
<script>
;(function(){
var html=document.documentElement;
var $=function(s){return document.getElementById(s)};
function fB(b){if(!b&&b!==0)return'--';var u=['B','KB','MB','GB','TB'];var i=0;var v=Math.abs(b);while(v>=1024&&i<u.length-1){v/=1024;i++}return v.toFixed(i>0?1:0)+' '+u[i]}
function fS(bps){if(!bps&&bps!==0)return'--';var a=Math.abs(bps);if(a>=1073741824)return(a/1073741824).toFixed(2)+' GB/s';if(a>=1048576)return(a/1048576).toFixed(1)+' MB/s';if(a>=1024)return(a/1024).toFixed(1)+' KB/s';return a.toFixed(0)+' B/s'}
function fUs(s){if(!s)return'--';var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600);return d>0?d+'d '+h+'h':h+'h'}
function pc(u,t){return t?Math.min(100,Math.round(u/t*100)):0}
function fTL(t){if(!t)return'';var d=new Date(t);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function flatLive(r){if(!r||typeof r!=='object')return r;if(typeof r.cpu==='number')return r;return{cpu:Math.round((r.cpu?.usage||0)*100)/100,memory_used:r.ram?.used||0,memory_total:r.ram?.total||0,swap_used:r.swap?.used||0,swap_total:r.swap?.total||0,disk_used:r.disk?.used||0,disk_total:r.disk?.total||0,network_tx:r.network?.up||0,network_rx:r.network?.down||0,network_total_up:r.network?.totalUp||0,network_total_down:r.network?.totalDown||0,tcp:r.connections?.tcp||0,udp:r.connections?.udp||0,load1:r.load?.load1||0,load5:r.load?.load5||0,load15:r.load?.load15||0,uptime:r.uptime||0,process:r.process||0,updated_at:r.updated_at||''}}
function cAlpha(c,a){if(c.startsWith('#')){var hex=c.slice(1);if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];return'rgba('+parseInt(hex.slice(0,2),16)+','+parseInt(hex.slice(2,4),16)+','+parseInt(hex.slice(4,6),16)+','+a+')'}var m=c.match(/[\d.]+/g);if(m&&m.length>=3)return'rgba('+m[0]+','+m[1]+','+m[2]+','+a+')';return c}

var S={nodes:[],liveData:{},onlineSet:new Set(),ws:null,uuid:null,node:null,hours:6,pingTasks:[],events:[],_lastSnap:'',maxLoadH:24,maxPingH:24};

function setTheme(t){html.setAttribute('data-theme',t);localStorage.setItem('prts-nx-theme',t);var b=$('themeBtn');if(b)b.textContent=t==='dark'?'☀':'◐';requestAnimationFrame(function(){drawAllCharts()})}
function toggleTheme(){setTheme(html.getAttribute('data-theme')==='dark'?'light':'dark')}

function fetchNodes(){return fetch('/api/nodes').then(function(r){return r.json()}).then(function(j){S.nodes=(j.data||j)||[]})}
function connectWS(){
  var p=location.protocol==='https:'?'wss:':'ws:';
  S.ws=new WebSocket(p+'//'+location.host+'/api/clients');
  S.ws.onopen=function(){S.ws.send('get');setInterval(function(){if(S.ws&&S.ws.readyState===1)S.ws.send('get')},3000)};
  S.ws.onmessage=function(e){try{var m=JSON.parse(e.data);var payload=m.status==='success'&&m.data?m.data:m.data&&Array.isArray(m.data.online)?m.data:Array.isArray(m.online)?m:null;if(!payload)return;S.onlineSet=new Set(payload.online||[]);if(payload.data){for(var k in payload.data)if(payload.data.hasOwnProperty(k))S.liveData[k]=flatLive(payload.data[k])}if(S.uuid)updateLive()}catch(er){console.error(er)}};
  S.ws.onclose=function(){setTimeout(connectWS,3000)};
}

function showNodeSelect(){
  var app=$('app');
  var h='<div class="hd" style="margin-bottom:8px"><div class="hc"><div style="font-family:var(--p-mono);font-weight:700;font-size:14px;letter-spacing:2px">COMMAND NEXUS</div><div class="hk">选择节点进入驾驶舱</div></div><a class="back-btn" href="/" style="margin-left:auto">◂ DASHBOARD</a><button class="theme-btn" onclick="toggleTheme()" id="themeBtn">◐</button></div>';
  h+='<div class="node-select" id="nodeList">';
  S.nodes.forEach(function(n){
    var on=S.onlineSet.has(n.uuid);var d=S.liveData[n.uuid]||{};var cpu=Math.round(d.cpu||0);var ram=pc(d.memory_used,d.memory_total);
    var meta=[n.region||'',n.group||'',n.os?(n.os.split(' ').slice(0,3).join(' ')):''].filter(Boolean).join(' · ');
    h+='<button class="node-btn" data-uuid="'+n.uuid+'"><span class="ndot '+(on?'on':'off')+'"></span><div class="ninfo"><div class="nname">'+esc(n.name)+'</div><div class="nmeta">'+esc(meta)+'</div>'+(on&&d.cpu!==undefined?'<div class="nmeta" style="margin-top:1px;color:var(--p-text-secondary)">CPU '+cpu+'% · RAM '+ram+'% · '+fUs(d.uptime)+'</div>':'')+'</div><span class="nstatus '+(on?'on':'off')+'">'+(on?'ONLINE':'OFFLINE')+'</span></button>';
  });

function genTimeSteps(maxH){var all=[1,3,6,12,24,48,72,168,336,720];var steps=all.filter(function(h){return h<=maxH});if(!steps.length||steps[steps.length-1]<maxH)steps.push(maxH);if(steps.length<=5)return steps;var pick=[steps[0]];var gap=(steps.length-1)/4;for(var i=1;i<4;i++)pick.push(steps[Math.round(i*gap)]);pick.push(steps[steps.length-1]);return pick.filter(function(v,i,a){return a.indexOf(v)===i}).sort(function(a,b){return a-b})}
